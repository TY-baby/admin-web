version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: base-room-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: base_room_root_2026
      MYSQL_DATABASE: base_room
      MYSQL_USER: base_user
      MYSQL_PASSWORD: base_pass_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./base-back/models/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbase_room_root_2026"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "3306:3306"
    networks:
      - base-room-net

  backend:
    build: ./base-back
    container_name: base-room-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: base_user
      DB_PASSWORD: base_pass_2026
      DB_NAME: base_room
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: base-room-secret-key-2026
      JWT_EXPIRES_IN: 24h
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - base-room-net

  frontend:
    build: ./base-front
    container_name: base-room-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - base-room-net
    volumes:
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:

networks:
  base-room-net:
    driver: bridge
