<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>图标生成器</title>
<style>
body { font-family: 'Microsoft YaHei'; background: #f5f5f5; padding: 40px; text-align: center; }
.grid { display: grid; grid-template-columns: repeat(3, 160px); gap: 30px; justify-content: center; margin: 30px auto; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.card canvas { display: block; margin: 0 auto 10px; }
.card .name { font-size: 14px; color: #333; font-weight: 600; }
.btn { display: inline-block; margin-top: 20px; padding: 12px 36px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.btn:hover { background: #4338ca; }
#status { margin-top: 16px; color: #666; }
</style>
</head>
<body>
<h2>CRM 图标生成器</h2>
<p>6个图标预览如下，点击下方按钮逐个下载 PNG</p>
<div class="grid" id="grid"></div>
<button class="btn" onclick="downloadAll()">全部下载 PNG</button>
<div id="status"></div>

<script>
const SIZE = 200;
const icons = [
  { name: '我的客户', draw: drawCustomer },
  { name: '我的计划拨打', draw: drawPhone },
  { name: '我的核款', draw: drawVerify },
  { name: '我的入款', draw: drawMoney },
  { name: '通时遇次', draw: drawClock },
  { name: '高价值公海库', draw: drawTreasure }
];

const grid = document.getElementById('grid');
const canvases = [];

icons.forEach((icon, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  card.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'name';
  label.textContent = icon.name;
  card.appendChild(label);
  grid.appendChild(card);
  canvases.push(canvas);
  icon.draw(canvas.getContext('2d'));
});

function drawBg(ctx) {
  // 蓝色渐变圆形背景
  const g = ctx.createRadialGradient(SIZE/2, SIZE/2, 10, SIZE/2, SIZE/2, SIZE/2);
  g.addColorStop(0, '#5b8def');
  g.addColorStop(1, '#3a6dd8');
  ctx.beginPath();
  ctx.arc(SIZE/2, SIZE/2, SIZE/2 - 4, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
}

function setWhiteStroke(ctx, w) {
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = w || 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

// 1. 我的客户 - 人形图标
function drawCustomer(ctx) {
  drawBg(ctx);
  setWhiteStroke(ctx, 5);
  const cx = SIZE/2, cy = SIZE/2;
  // 头部
  ctx.beginPath();
  ctx.arc(cx, cy - 22, 24, 0, Math.PI * 2);
  ctx.stroke();
  // 身体
  ctx.beginPath();
  ctx.arc(cx, cy + 50, 40, Math.PI * 1.2, Math.PI * 1.8);
  ctx.stroke();
  // 小装饰圆点
  ctx.beginPath();
  ctx.arc(cx + 36, cy - 40, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

// 2. 我的计划拨打 - 电话图标
function drawPhone(ctx) {
  drawBg(ctx);
  setWhiteStroke(ctx, 5);
  const cx = SIZE/2, cy = SIZE/2;
  // 电话听筒
  ctx.beginPath();
  ctx.moveTo(cx - 30, cy - 35);
  ctx.quadraticCurveTo(cx - 35, cy - 10, cx - 20, cy + 5);
  ctx.lineTo(cx - 10, cy + 0);
  ctx.quadraticCurveTo(cx - 5, cy - 15, cx - 15, cy - 30);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(cx + 30, cy + 35);
  ctx.quadraticCurveTo(cx + 35, cy + 10, cx + 20, cy - 5);
  ctx.lineTo(cx + 10, cy + 0);
  ctx.quadraticCurveTo(cx + 5, cy + 15, cx + 15, cy + 30);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();

  // 信号波纹
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 3;
  for (let r = 12; r <= 24; r += 12) {
    ctx.beginPath();
    ctx.arc(cx + 5, cy - 5, r, -Math.PI * 0.7, -Math.PI * 0.2);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

// 3. 我的核款 - 盾牌+勾选图标
function drawVerify(ctx) {
  drawBg(ctx);
  setWhiteStroke(ctx, 5);
  const cx = SIZE/2, cy = SIZE/2;
  // 盾牌
  ctx.beginPath();
  ctx.moveTo(cx, cy - 45);
  ctx.lineTo(cx + 38, cy - 28);
  ctx.lineTo(cx + 35, cy + 10);
  ctx.quadraticCurveTo(cx + 20, cy + 45, cx, cy + 50);
  ctx.quadraticCurveTo(cx - 20, cy + 45, cx - 35, cy + 10);
  ctx.lineTo(cx - 38, cy - 28);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();
  // 勾选
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(cx - 15, cy + 2);
  ctx.lineTo(cx - 3, cy + 16);
  ctx.lineTo(cx + 18, cy - 12);
  ctx.stroke();
}

// 4. 我的入款 - 钱/人民币图标
function drawMoney(ctx) {
  drawBg(ctx);
  setWhiteStroke(ctx, 5);
  const cx = SIZE/2, cy = SIZE/2;
  // 圆形外框
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI * 2);
  ctx.stroke();
  // ¥ 符号
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy - 25);
  ctx.lineTo(cx, cy - 5);
  ctx.lineTo(cx + 18, cy - 25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy - 5);
  ctx.lineTo(cx, cy + 22);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 16, cy);
  ctx.lineTo(cx + 16, cy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 16, cy + 10);
  ctx.lineTo(cx + 16, cy + 10);
  ctx.stroke();
}

// 5. 通时遇次 - 时钟图标
function drawClock(ctx) {
  drawBg(ctx);
  setWhiteStroke(ctx, 5);
  const cx = SIZE/2, cy = SIZE/2;
  // 时钟外圆
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI * 2);
  ctx.stroke();
  // 时针
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, cy - 25);
  ctx.stroke();
  // 分针
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + 20, cy + 8);
  ctx.stroke();
  // 中心点
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  // 小装饰 - 旋转箭头
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, 52, -Math.PI * 0.3, Math.PI * 0.3);
  ctx.stroke();
  // 箭头尖
  const ax = cx + 52 * Math.cos(Math.PI * 0.3);
  const ay = cy + 52 * Math.sin(Math.PI * 0.3);
  ctx.beginPath();
  ctx.moveTo(ax - 8, ay - 6);
  ctx.lineTo(ax, ay);
  ctx.lineTo(ax + 4, ay - 10);
  ctx.stroke();
}

// 6. 高价值公海库 - 宝箱/数据库图标
function drawTreasure(ctx) {
  drawBg(ctx);
  setWhiteStroke(ctx, 5);
  const cx = SIZE/2, cy = SIZE/2;
  // 数据库(三层)
  for (let i = 0; i < 3; i++) {
    const y = cy - 25 + i * 22;
    ctx.beginPath();
    ctx.ellipse(cx, y, 38, 12, 0, 0, Math.PI * 2);
    ctx.stroke();
    if (i < 2) {
      ctx.beginPath();
      ctx.moveTo(cx - 38, y);
      ctx.lineTo(cx - 38, y + 22);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 38, y);
      ctx.lineTo(cx + 38, y + 22);
      ctx.stroke();
    }
  }
  // 星星装饰
  ctx.fillStyle = '#fbbf24';
  drawStar(ctx, cx + 32, cy - 38, 8, 5);
}

function drawStar(ctx, cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.4;
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function downloadAll() {
  const status = document.getElementById('status');
  icons.forEach((icon, i) => {
    setTimeout(() => {
      const canvas = canvases[i];
      const link = document.createElement('a');
      link.download = icon.name + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      status.textContent = '已下载: ' + icon.name + '.png (' + (i + 1) + '/6)';
    }, i * 500);
  });
}
</script>
</body>
</html>
