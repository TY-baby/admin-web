server {
    listen 80;
    server_name localhost;

    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 移动端 H5 静态资源
    location /m/ {
        alias /usr/share/nginx/html/m/;
        try_files $uri $uri/ /m/index.html;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # PC 端首页：通过 User-Agent 二次兜底跳转移动端
    location = / {
        if ($http_user_agent ~* "iphone|ipad|ipod|android|mobile|blackberry|webos|incognito|webmate|bada|nokia|lg|ucweb|ios|windows phone") {
            return 302 /m/;
        }
        try_files /index.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Charset utf-8;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location ^~ /static/ {
        proxy_pass http://backend:3000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Type "application/javascript; charset=utf-8";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
